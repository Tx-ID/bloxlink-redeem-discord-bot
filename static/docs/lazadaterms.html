<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h</title>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #1a1a1a;
            --muted: #666;
            --border: #ddd;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --fg: #e6e6e6;
                --muted: #9a9a9a;
                --border: #2a2a2a;
            }
        }
        html { color-scheme: light dark; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            line-height: 1.6;
            color: var(--fg);
            background: var(--bg);
        }
        h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1.1rem; margin-top: 1.75rem; }
        .updated { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
        ul { padding-left: 1.25rem; }
        li { margin: 0.25rem 0; }
        .notice {
            margin-top: 2rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.875rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>h</h1>
</body>
</html>
